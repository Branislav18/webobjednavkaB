<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Objednávka</title>
<!-- Importing the handwriting font from Google Fonts -->
<link rel="preconnect" href="https://googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  /* Seamless dark rose wallpaper texture background */
  background: linear-gradient(rgba(28, 10, 15, 0.88), rgba(20, 5, 8, 0.93)), url('https://unsplash.com');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  font-family: 'Playfair Display', serif;
  color: #fff;
  text-align: center;
}
.container {
  max-width: 650px;
  padding: 60px 40px;
  background: rgba(36, 12, 19, 0.85);
  border-radius: 30px;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 105, 180, 0.15);
  backdrop-filter: blur(12px);
  border: 2px solid rgba(216, 27, 96, 0.25);
  position: relative;
  overflow: hidden;
}
/* Custom Curlings / Ornaments via vector SVG borders */
.flourish-top, .flourish-bottom {
  width: 180px;
  height: auto;
  opacity: 0.7;
  display: block; margin: 0 auto;
}
.flourish-top {
  margin-bottom: 25px;
}
.flourish-bottom {
  margin-top: 35px;
}
h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 3rem;
  line-height: 1.4;
  margin-bottom: 45px;
  font-weight: normal;
  color: #ffaec9;
  text-shadow: 2px 3px 6px rgba(0, 0, 0, 0.9);
  padding: 0 10px;
}

/* Calendar Form Wrapper and Input Styling */
.calendar-wrapper {
  margin-bottom: 35px;
}
.calendar-label {
  display: block;
  font-size: 1.2rem;
  margin-bottom: 10px;
  color: #ffaec9;
  letter-spacing: 1px;
}
.date-picker {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  padding: 12px 20px;
  border-radius: 25px;
  border: 2px solid rgba(216, 27, 96, 0.4);
  background: rgba(20, 5, 8, 0.8);
  color: #fff;
  outline: none;
  text-align: center;
  transition: all 0.3s ease;
  cursor: pointer;
}
.date-picker:focus {
  border-color: #ff4081;
  box-shadow: 0 0 15px rgba(255, 64, 129, 0.4);
}
/* Styling the calendar picker icon color indicator for modern browsers */
.date-picker::-webkit-calendar-picker-indicator {
  filter: invert(1) sepia(1) saturate(5) hue-rotate(295deg);
  cursor: pointer;
}

/* Optimized, Larger & Nicer Button Design */
.submit-btn {
  display: inline-block;
  background: linear-gradient(45deg, #b71c1c, #d81b60);
  color: white;
  
  /* Size and Typography Enhancements */
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem; 
  font-weight: bold;
  letter-spacing: 2px;
  text-decoration: none;
  padding: 22px 70px; 
  border-radius: 50px;
  border: 1px solid rgba(255, 182, 193, 0.4);
  cursor: pointer;
  outline: none;

  /* Ambient Glow and Transition Properties */
  box-shadow: 0 8px 25px rgba(216, 27, 96, 0.5);
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Smooth Hovering Effects */
.submit-btn:hover {
  transform: scale(1.08) translateY(-4px); 
  background: linear-gradient(45deg, #d81b60, #ff4081);
  box-shadow: 0 15px 35px rgba(255, 64, 129, 0.7), 0 0 20px rgba(255, 174, 201, 0.5);
}

/* Instant Response on Click */
.submit-btn:active {
  transform: scale(0.97) translateY(-1px);
  box-shadow: 0 5px 15px rgba(216, 27, 96, 0.6);
}
</style>
</head>
<body>
<div class="container">
  <!-- Top Ornamental Curling (Flourish) SVG -->
  <svg class="flourish-top" viewBox="0 0 100 20" fill="none" xmlns="http://w3.org">
    <path d="M10 10C25 0 35 20 50 10C65 0 75 20 90 10M50 2C45 5 40 5 35 2M50 2C55 5 60 5 65 2" stroke="#ff4081" stroke-width="1" stroke-linecap="round"/>
    <circle cx="50" cy="10" r="1.5" fill="#ff4081"/>
  </svg>

  <h1>Chcete si objednatj Majstra zo silikónskima šikovnima prštjokami, pre vašu náladu? Kliknite na temto button a dostanete ho zdarma na adresu v lehote do 4 dní z bezplatným doručením.</h1>

  <!-- Calendar form field added before the button -->
  <div class="calendar-wrapper">
    <label for="order-date" class="calendar-label">Vyberte si dátum:</label>
    <input type="date" id="order-date" class="date-picker">
  </div>

  <!-- The styled, responsive button -->
  <button class="submit-btn" onclick="sendQuickEmail()">Chcem Majstra</button>

  <script>
  function sendQuickEmail() {
    const dateInput = document.getElementById("order-date").value;
    
    // Validation check if user didn't pick a date
    if (!dateInput) {
      alert("Prosím, vyberte najskôr dátum z kalendára.");
      return;
    }

    // Formats the raw YYYY-MM-DD input value to Slovak format DD.MM.YYYY
    const dateParts = dateInput.split("-");
    const formattedDate = `${dateParts[2]}.${dateParts[1]}.${dateParts[0]}`;

    const formData = new FormData();
    formData.append("To Target", "nstudiok2@gmail.com");
    formData.append("Poruka", `Vážená pani Katarína Križanová. Objednali ste si Majstra zo silikónskima šikovnima prštjokami, pre vašu náladu na ďeň ${formattedDate}. On sa Vám nakokotí na adrese v Pezinku v lehote do 4 dní.`);

    fetch("https://formspree.io/f/mykaqbgl", {
      method: "POST",
      body: formData,
      headers: { 'Accept': 'application/json' }
    })
    .then(response => {
      if (response.ok) {
        alert("Sent successfully! (Check your Formspree linked inbox)");
      } else {
        alert("Error submitting form.");
      }
    })
    .catch(error => {
      alert("Network connection error.");
    });
  }
  </script>

  <!-- Bottom Ornamental Curling (Flourish) SVG -->
  <svg class="flourish-bottom" viewBox="0 0 100 20" fill="none" xmlns="http://w3.org">
    <path d="M10 10C25 20 35 0 50 10C65 20 75 0 90 10M50 18C45 15 40 15 35 18M50 18C55 15 60 15 65 18" stroke="#ff4081" stroke-width="1" stroke-linecap="round"/>
    <circle cx="50" cy="10" r="1.5" fill="#ff4081"/>
  </svg>
</div>
</body>
</html>
